#
---
default:
  artifacts:
    expire_in:
      3 day

include:
  # cf: https://docs.gitlab.com/ee/ci/yaml/includes.html
  - ".gitlab/ci/workflow.yml"
  - ".gitlab/ci/stages.yml"
  - ".gitlab/ci/core.yml"

  - ".gitlab/ci/python.yml"
  - ".gitlab/ci/pre-commit.yml"
  - ".gitlab/ci/releases.yml"

pre-commit:
  extends: .pre-commit

pre-commit:autoupdate:
  extends: .pre-commit:autoupdate


gitlab:release:
  extends: .gitlab:release
  release:
    name: "$CI_COMMIT_TAG"
    description: "$CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    ref: "$CI_COMMIT_SHA"
    assets:
      links:
        - name: 'Pipeline URL'
          url: "$CI_PIPELINE_URL"
          link_type: 'other'
        - name: 'Download'
          url: "https://asustor.cappysan.dev/downloads/${CI_PROJECT_NAME}/cappysan-${CI_PROJECT_NAME}_${CI_COMMIT_TAG}_any.apk"
          link_type: 'package'
        - name: 'Signature'
          url: "https://asustor.cappysan.dev/downloads/${CI_PROJECT_NAME}/cappysan-${CI_PROJECT_NAME}_${CI_COMMIT_TAG}_any.apk.sig"
          link_type: 'other'
  needs:

    # Require pre-commit to force nitpick check
    - job: pre-commit
      artifacts: false

  rules:
    - !reference [".gitlab:release", rules]
    - when: manual
production:deploy:
  stage: deploy
  tags:
    - prod
  script:
    - make apk
    - export KEYID=0x567E6DE2D742145E
    - export FILENAME=$(ls cappysan-*.apk)
    - gpg --no-default-keyring --default-key ${KEYID} --pinentry-mode=loopback --output ${FILENAME}.sig --detach-sig --sign ${FILENAME}
    - cp -v ${FILENAME}.sig ${FILENAME} /srv/wwwroot/asustor.cappysan.dev/htdocs/downloads/${CI_PROJECT_NAME}/
    - cd /srv/wwwroot/asustor.cappysan.dev/htdocs/downloads/${CI_PROJECT_NAME}/
    - md5sum --check < MD5SUMS
    - sha512sum --check < SHA512SUMS
    - md5sum *apk *apk.sig > MD5SUMS
    - sha512sum *apk *apk.sig > SHA512SUMS
  rules:
    - !reference [".gitlab:release", rules]
    - when: manual

production:clean:
  stage: deploy
  tags:
    - prod
  script:
    - cd /srv/wwwroot/asustor.cappysan.dev/htdocs/downloads/${CI_PROJECT_NAME}/
    - md5sum --check < MD5SUMS
    - sha512sum --check < SHA512SUMS
    - ls -1c *.apk* | tac | head -n -2 | tac | xargs rm -v
    - md5sum *apk *apk.sig > MD5SUMS
    - sha512sum *apk *apk.sig > SHA512SUMS
  rules:
    - !reference [".gitlab:release", rules]
    - when: manual
