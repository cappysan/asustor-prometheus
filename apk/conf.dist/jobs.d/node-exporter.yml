---
scrape_configs:
  # This job monitors the system via the node exporter
  - job_name: "node-exporter-http"
    metrics_path: /metrics
    scheme: http
    file_sd_configs:
      - files:
          - "node-exporter.d/node-exporter-http.yml"
    relabel_configs: &instance_relabel
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(:[0-9]+)?"
        replacement: "${1}"
      - target_label: app
        replacement: node-exporter
      - target_label: job
        replacement: node-exporter

  - job_name: "node-exporter-https"
    metrics_path: /metrics
    scheme: https
    tls_config:
      insecure_skip_verify: false
    file_sd_configs:
      - files:
          - "node-exporter.d/node-exporter-https.yml"
    relabel_configs: *instance_relabel
