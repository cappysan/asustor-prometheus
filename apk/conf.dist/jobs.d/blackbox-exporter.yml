---
scrape_configs:
  # This job monitors the blackbox exporter itself, not it's targets
  - job_name: "blackbox-exporter"
    metrics_path: /metrics
    scheme: https
    tls_config:
      insecure_skip_verify: false
    file_sd_configs:
      - files:
          - "blackbox-exporter.d/*.yml"
    relabel_configs: &instance_relabel
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+)(:[0-9]+)?"
        replacement: "${1}"
      - target_label: app
        replacement: blackbox-exporter
      - target_label: service
        replacement: exporter
